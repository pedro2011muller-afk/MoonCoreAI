<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonCore</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        #chat {
            height: 85vh;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user {
            background: #3b82f6;
            margin-left: auto;
        }

        .bot {
            background: #1e293b;
        }

        #inputArea {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 15px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 15px;
            background: #3b82f6;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Digite..." />
    <button onclick="send()">Enviar</button>
</div>

<script>
async function send() {
    let input = document.getElementById("msg");
    let text = input.value;

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    let data = await res.json();
    addMsg(data.response, "bot");
}

function addMsg(text, type) {
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
